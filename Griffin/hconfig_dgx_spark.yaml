# Accelerate config for NVIDIA DGX Spark GB10 (single Blackwell GPU)
# Place this at ~/.cache/huggingface/accelerate/default_config.yaml
# or pass via: accelerate launch --config_file hconfig_dgx_spark.yaml ...
compute_environment: LOCAL_MACHINE
deepspeed_config: {}
distributed_type: 'NO'
fsdp_config: {}
machine_rank: 0
main_process_ip: null
main_process_port: 29502
main_training_function: main
num_machines: 1
num_processes: 1
use_cpu: false
